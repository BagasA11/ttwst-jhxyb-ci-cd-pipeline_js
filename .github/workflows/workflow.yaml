name: "CI workflow"
on: 
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: "ubuntu-latest"
    container: "node:20-alpine" 
  steps:
    # checkout > install dependencies > lint > unit test
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Install npm package
      run: npm install
    - name: lint codespace to ensure met standard style
      run: |
        npm run lint
    - name: testing codebase
      run: npm run test:watch

    

